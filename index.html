<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>글로벌 제재 지도</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
:root {
  --bg: #080a0f;
  --surface: #0d1017;
  --surface2: #131820;
  --border: #1a2035;
  --border2: #243050;
  --text: #d4dae8;
  --text2: #6b7a99;
  --text3: #2e3a55;
  --un-color: #3b9eff;
  --us-color: #ff4f4f;
  --both-color: #c44dff;
  --neutral: #1a2240;
  --ocean: #07090e;
  --accent: #00d4ff;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Noto Sans KR', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; overflow-x: hidden; }

header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  background: rgba(8,10,15,0.95); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo { display: flex; align-items: center; gap: 10px; font-family: var(--mono); font-size: 13px; letter-spacing: 0.08em; }
.logo-box { width: 28px; height: 28px; border: 1.5px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--accent); font-weight: 600; position: relative; overflow: hidden; }
.logo-box::after { content: ''; position: absolute; inset: 0; background: var(--accent); opacity: 0.08; }
.logo span { color: var(--accent); }
.live-badge { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 10px; color: var(--text2); letter-spacing: 0.1em; }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: #3bff8a; animation: livepulse 2s infinite; }
@keyframes livepulse { 0%,100% { box-shadow: 0 0 0 0 rgba(59,255,138,0.5); } 50% { box-shadow: 0 0 0 5px rgba(59,255,138,0); } }

.layout { display: flex; height: 100vh; padding-top: 56px; }

.sidebar { width: 280px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; }
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border2); }
.sidebar-section { padding: 16px 20px; border-bottom: 1px solid var(--border); }
.sec-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em; color: var(--text3); text-transform: uppercase; margin-bottom: 12px; }

.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat-card { background: var(--surface2); border: 1px solid var(--border); padding: 10px; border-radius: 2px; }
.stat-num { font-family: var(--mono); font-size: 20px; font-weight: 600; line-height: 1; margin-bottom: 3px; }
.stat-label { font-size: 10px; color: var(--text2); }

.filter-group { display: flex; flex-direction: column; gap: 5px; }
.filter-btn { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border: 1px solid var(--border); background: var(--surface2); cursor: pointer; border-radius: 2px; transition: all 0.2s; font-family: var(--sans); font-size: 12px; color: var(--text2); width: 100%; text-align: left; }
.filter-btn.active { color: var(--text); border-color: var(--border2); }
.filter-btn.active.un { border-left: 3px solid var(--un-color); }
.filter-btn.active.us { border-left: 3px solid var(--us-color); }
.filter-btn.active.both { border-left: 3px solid var(--both-color); }
.filter-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.dot-un { background: var(--un-color); box-shadow: 0 0 6px rgba(59,158,255,0.6); }
.dot-us { background: var(--us-color); box-shadow: 0 0 6px rgba(255,79,79,0.6); }
.dot-both { background: var(--both-color); box-shadow: 0 0 6px rgba(196,77,255,0.6); }
.filter-count { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--text2); }

.country-list { display: flex; flex-direction: column; }
.country-item { display: flex; align-items: center; gap: 8px; padding: 9px 20px; border-bottom: 1px solid var(--border); cursor: pointer; transition: all 0.15s; font-size: 12px; color: var(--text2); }
.country-item:last-child { border-bottom: none; }
.country-item:hover { color: var(--text); background: rgba(255,255,255,0.02); padding-left: 24px; }
.country-item.selected { color: var(--text); background: rgba(255,255,255,0.03); padding-left: 24px; border-left: 2px solid var(--accent); }
.country-flag { font-size: 14px; }
.country-badges { margin-left: auto; display: flex; gap: 3px; }
.badge { padding: 1px 5px; font-size: 8px; font-family: var(--mono); letter-spacing: 0.05em; border-radius: 1px; }
.badge-un { background: rgba(59,158,255,0.15); color: var(--un-color); border: 1px solid rgba(59,158,255,0.3); }
.badge-us { background: rgba(255,79,79,0.15); color: var(--us-color); border: 1px solid rgba(255,79,79,0.3); }

.map-area { flex: 1; position: relative; overflow: hidden; background: var(--ocean); }
#map-svg { width: 100%; height: 100%; cursor: grab; }
#map-svg:active { cursor: grabbing; }
.country-path { stroke: #0d1825; stroke-width: 0.5; transition: opacity 0.15s; }
.country-path.un-sanction { fill: var(--un-color); opacity: 0.75; }
.country-path.us-sanction { fill: var(--us-color); opacity: 0.75; }
.country-path.both-sanction { fill: var(--both-color); opacity: 0.8; }
.country-path.neutral { fill: var(--neutral); opacity: 1; }
.country-path:hover { opacity: 1 !important; stroke: rgba(255,255,255,0.4); stroke-width: 1; }
.country-path.highlighted { opacity: 1 !important; stroke: #fff; stroke-width: 1.5; }

.map-legend { position: absolute; bottom: 24px; left: 24px; background: rgba(8,10,15,0.88); backdrop-filter: blur(12px); border: 1px solid var(--border); padding: 12px 14px; }
.legend-title { font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em; color: var(--text3); text-transform: uppercase; margin-bottom: 8px; }
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text2); margin-bottom: 5px; }
.legend-item:last-child { margin-bottom: 0; }
.legend-swatch { width: 11px; height: 11px; border-radius: 1px; flex-shrink: 0; }

.map-controls { position: absolute; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 4px; }
.map-btn { width: 32px; height: 32px; background: rgba(8,10,15,0.88); backdrop-filter: blur(12px); border: 1px solid var(--border); color: var(--text2); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; font-family: var(--mono); }
.map-btn:hover { color: var(--text); border-color: var(--border2); }

.tooltip { position: absolute; pointer-events: none; background: rgba(8,10,15,0.95); backdrop-filter: blur(12px); border: 1px solid var(--border2); padding: 10px 14px; display: none; z-index: 300; max-width: 220px; }
.tooltip.show { display: block; }
.tt-name { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
.tt-badges { display: flex; gap: 4px; margin-bottom: 5px; }
.tt-desc { font-size: 11px; color: var(--text2); line-height: 1.5; }
.tt-hint { font-size: 10px; color: var(--accent); margin-top: 6px; font-family: var(--mono); opacity: 0.7; }

.view-toggle { position: absolute; top: 16px; right: 16px; display: flex; gap: 2px; }
.vt-btn { padding: 6px 14px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; background: rgba(8,10,15,0.88); border: 1px solid var(--border); color: var(--text2); cursor: pointer; transition: all 0.15s; }
.vt-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(0,212,255,0.05); }

.map-topbar { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); background: rgba(8,10,15,0.8); backdrop-filter: blur(12px); border: 1px solid var(--border); padding: 7px 18px; font-family: var(--mono); font-size: 11px; color: var(--text2); white-space: nowrap; }
.map-topbar span { color: var(--text); }

/* ═══ DRAWER ═══ */
.drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 400; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.drawer-overlay.open { opacity: 1; pointer-events: all; }

.drawer { position: fixed; top: 56px; right: 0; bottom: 0; width: 500px; max-width: 92vw; background: var(--surface); border-left: 1px solid var(--border2); z-index: 500; transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); display: flex; flex-direction: column; overflow: hidden; }
.drawer.open { transform: translateX(0); }

.drawer-head { padding: 24px 28px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0; position: relative; }
.drawer-close { position: absolute; top: 20px; right: 20px; width: 30px; height: 30px; background: var(--surface2); border: 1px solid var(--border2); color: var(--text2); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.drawer-close:hover { color: var(--text); }
.drawer-flag { font-size: 32px; margin-bottom: 8px; display: block; }
.drawer-country { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; }
.drawer-cat { display: inline-block; padding: 3px 10px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; border-radius: 2px; }

.drawer-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.dtab { flex: 1; padding: 11px 6px; text-align: center; font-size: 11px; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; font-family: var(--mono); letter-spacing: 0.03em; }
.dtab:hover { color: var(--text); }
.dtab.active { color: var(--accent); border-bottom-color: var(--accent); }

.drawer-body { flex: 1; overflow-y: auto; padding: 22px 26px; }
.drawer-body::-webkit-scrollbar { width: 3px; }
.drawer-body::-webkit-scrollbar-thumb { background: var(--border2); }

.tab-pane { display: none; }
.tab-pane.active { display: block; }

/* Overview */
.overview-summary { font-size: 13px; color: var(--text2); line-height: 1.75; padding: 14px 16px; background: var(--surface2); border: 1px solid var(--border); margin-bottom: 20px; border-left: 3px solid var(--accent); }
.info-block { margin-bottom: 20px; }
.info-block-title { font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em; color: var(--text3); text-transform: uppercase; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.info-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid rgba(26,32,53,0.6); gap: 16px; }
.info-row:last-child { border-bottom: none; }
.info-key { font-size: 11px; color: var(--text2); flex-shrink: 0; min-width: 80px; }
.info-val { font-size: 12px; color: var(--text); text-align: right; line-height: 1.5; }
.sector-tags { display: flex; flex-wrap: wrap; gap: 4px; justify-content: flex-end; }
.sector-tag { padding: 2px 7px; font-size: 10px; font-family: var(--mono); background: rgba(0,212,255,0.07); color: var(--accent); border: 1px solid rgba(0,212,255,0.2); border-radius: 2px; }
.severity-badge { padding: 3px 10px; font-family: var(--mono); font-size: 11px; border-radius: 2px; font-weight: 600; }
.sev-critical { background: rgba(255,79,79,0.15); color: var(--us-color); border: 1px solid rgba(255,79,79,0.3); }
.sev-high { background: rgba(255,140,66,0.15); color: #ff8c42; border: 1px solid rgba(255,140,66,0.3); }
.sev-medium { background: rgba(255,214,10,0.15); color: #ffd60a; border: 1px solid rgba(255,214,10,0.3); }

/* Sanctions */
.sanction-block { background: var(--surface2); border: 1px solid var(--border); padding: 18px; margin-bottom: 14px; position: relative; overflow: hidden; }
.sanction-block::before { content: ''; position: absolute; top: 0; left: 0; bottom: 0; width: 3px; }
.sanction-block.un::before { background: var(--un-color); }
.sanction-block.us::before { background: var(--us-color); }
.sb-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; }
.sb-icon { font-size: 18px; flex-shrink: 0; }
.sb-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.sb-subtitle { font-size: 10px; font-family: var(--mono); color: var(--text2); }
.sb-desc { font-size: 12px; color: var(--text2); line-height: 1.75; margin-bottom: 14px; }
.sb-details { display: flex; flex-direction: column; gap: 7px; }
.sb-detail-row { display: flex; gap: 10px; font-size: 11px; }
.sb-detail-key { color: var(--text3); font-family: var(--mono); width: 70px; flex-shrink: 0; padding-top: 1px; }
.sb-detail-val { color: var(--text2); line-height: 1.55; }

/* Timeline */
.timeline { position: relative; padding-left: 22px; }
.timeline::before { content: ''; position: absolute; left: 6px; top: 8px; bottom: 8px; width: 1px; background: var(--border2); }
.tl-item { position: relative; margin-bottom: 22px; }
.tl-item:last-child { margin-bottom: 0; }
.tl-dot { position: absolute; left: -20px; top: 5px; width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--bg); }
.tl-dot.un { background: var(--un-color); box-shadow: 0 0 6px rgba(59,158,255,0.5); }
.tl-dot.us { background: var(--us-color); box-shadow: 0 0 6px rgba(255,79,79,0.5); }
.tl-dot.both { background: var(--both-color); box-shadow: 0 0 6px rgba(196,77,255,0.5); }
.tl-date { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-bottom: 3px; }
.tl-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 5px; }
.tl-desc { font-size: 12px; color: var(--text2); line-height: 1.6; }
.tl-issuer { display: inline-block; margin-top: 6px; padding: 1px 7px; font-size: 9px; font-family: var(--mono); border-radius: 1px; }

/* Sources */
.source-item { background: var(--surface2); border: 1px solid var(--border); padding: 14px 16px; margin-bottom: 10px; transition: border-color 0.15s; }
.source-item:hover { border-color: var(--border2); }
.source-item:last-child { margin-bottom: 0; }
.source-org { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.source-type { display: inline-block; padding: 1px 7px; font-size: 9px; font-family: var(--mono); border-radius: 1px; margin-bottom: 7px; }
.source-desc { font-size: 11px; color: var(--text2); line-height: 1.6; margin-bottom: 10px; }
.source-link { display: inline-flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 10px; color: var(--accent); text-decoration: none; padding: 5px 12px; border: 1px solid rgba(0,212,255,0.25); background: rgba(0,212,255,0.05); transition: all 0.15s; }
.source-link:hover { background: rgba(0,212,255,0.12); border-color: rgba(0,212,255,0.5); }
.disclaimer { margin-top: 16px; padding: 12px 14px; background: var(--surface2); border: 1px solid var(--border); font-size: 10px; color: var(--text3); line-height: 1.65; font-family: var(--mono); }

/* AI 업데이트 버튼 */
.ai-update-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: rgba(0,212,255,0.04); border: 1px solid rgba(0,212,255,0.15); margin-bottom: 16px; }
.ai-update-label { display: flex; align-items: center; gap: 7px; font-family: var(--mono); font-size: 10px; color: var(--text2); }
.ai-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
.ai-dot.loading { animation: aipulse 1s infinite; }
@keyframes aipulse { 0%,100%{opacity:1;} 50%{opacity:0.2;} }
.btn-ai-refresh { display: flex; align-items: center; gap: 5px; padding: 5px 12px; background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.3); color: var(--accent); font-family: var(--mono); font-size: 10px; cursor: pointer; transition: all 0.15s; letter-spacing: 0.05em; }
.btn-ai-refresh:hover { background: rgba(0,212,255,0.16); }
.btn-ai-refresh:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-ai-refresh .spin { display: inline-block; }
.btn-ai-refresh.spinning .spin { animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* AI 로딩 스켈레톤 */
.ai-loading-box { padding: 32px 0; display: flex; flex-direction: column; align-items: center; gap: 12px; }
.ai-loading-spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
.ai-loading-text { font-family: var(--mono); font-size: 11px; color: var(--text2); }

/* AI 결과 섹션 */
.ai-section { margin-bottom: 18px; }
.ai-section-title { font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em; color: var(--text3); text-transform: uppercase; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.ai-news-item { background: var(--surface2); border: 1px solid var(--border); padding: 12px 14px; margin-bottom: 8px; transition: border-color 0.15s; }
.ai-news-item:hover { border-color: var(--border2); }
.ai-news-item:last-child { margin-bottom: 0; }
.ai-news-date { font-family: var(--mono); font-size: 9px; color: var(--text3); margin-bottom: 4px; }
.ai-news-title { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 5px; line-height: 1.4; }
.ai-news-desc { font-size: 11px; color: var(--text2); line-height: 1.65; }
.ai-tag { display: inline-block; padding: 1px 6px; font-size: 9px; font-family: var(--mono); border-radius: 1px; margin-top: 6px; }
.ai-updated-at { font-family: var(--mono); font-size: 9px; color: var(--text3); text-align: right; margin-top: 8px; }
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-box">SX</div>SANCTION<span>MAP</span></div>
  <div class="live-badge"><div class="live-dot"></div>GLOBAL SANCTIONS TRACKER</div>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sec-label">// 제재 현황 통계</div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-num" style="color:var(--un-color)" id="un-count">-</div><div class="stat-label">🇺🇳 UN 제재국</div></div>
        <div class="stat-card"><div class="stat-num" style="color:var(--us-color)" id="us-count">-</div><div class="stat-label">🇺🇸 미국 제재국</div></div>
        <div class="stat-card" style="grid-column:span 2"><div class="stat-num" style="color:var(--both-color)" id="both-count">-</div><div class="stat-label">🔴 UN + 미국 동시 제재국</div></div>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sec-label">// 필터</div>
      <div class="filter-group">
        <button class="filter-btn active both" id="btn-both" onclick="setFilter('both')"><div class="filter-dot dot-both"></div>UN + 미국 동시<span class="filter-count" id="fc-both"></span></button>
        <button class="filter-btn active un" id="btn-un" onclick="setFilter('un')"><div class="filter-dot dot-un"></div>UN 단독<span class="filter-count" id="fc-un"></span></button>
        <button class="filter-btn active us" id="btn-us" onclick="setFilter('us')"><div class="filter-dot dot-us"></div>미국 단독<span class="filter-count" id="fc-us"></span></button>
      </div>
    </div>
    <div style="padding:12px 20px 8px; border-bottom:1px solid var(--border); flex-shrink:0;">
      <div class="sec-label" style="margin-bottom:0;">// 국가 목록 — 클릭하여 상세보기</div>
    </div>
    <div class="country-list" id="country-list"></div>
  </div>

  <div class="map-area" id="map-area">
    <div class="map-topbar">총 <span id="visible-count">-</span>개국 제재 적용 중 &nbsp;·&nbsp; 국가 클릭 → 상세정보</div>
    <div class="view-toggle">
      <button class="vt-btn active" id="vt-all" onclick="setView('all')">전체</button>
      <button class="vt-btn" id="vt-un" onclick="setView('un_only')">UN만</button>
      <button class="vt-btn" id="vt-us" onclick="setView('us_only')">미국만</button>
    </div>
    <svg id="map-svg"></svg>
    <div class="map-legend">
      <div class="legend-title">// 범례</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--both-color)"></div>UN + 미국 동시</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--un-color)"></div>UN 단독</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--us-color)"></div>미국 단독</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--neutral)"></div>비제재국</div>
    </div>
    <div class="map-controls">
      <button class="map-btn" onclick="zoomIn()">+</button>
      <button class="map-btn" onclick="zoomOut()">−</button>
      <button class="map-btn" onclick="resetZoom()" style="font-size:10px">⌂</button>
    </div>

// ── 상태 ──
let activeFilters = { both:true, un:true, us:true };
let currentView = 'all';
let selectedCountry = null;
const aiCache = {}; // 국가별 AI 결과 캐시

function getCategory(d) {
  if (!d) return 'neutral';
  if (d.un && d.us) return 'both';
  if (d.un) return 'un';
  if (d.us) return 'us';
  return 'neutral';
}
function isVisible(d) {
  if (!d) return false;
  const cat = getCategory(d);
  if (currentView === 'un_only' && !d.un) return false;
  if (currentView === 'us_only' && !d.us) return false;
  if (!activeFilters[cat === 'both' ? 'both' : cat === 'un' ? 'un' : 'us']) return false;
  return true;
}

// ── DRAWER ──
function openDrawer(iso) {
  selectedCountry = iso;
  const d = sanctionData[iso];
  if (!d) return;
  renderDrawer(d);
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
  d3.selectAll('.country-path').classed('highlighted', false);
  d3.select(`#c-${iso}`).classed('highlighted', true);
  document.querySelectorAll('.country-item').forEach(el => el.classList.remove('selected'));
  const li = document.getElementById(`li-${iso}`);
  if (li) { li.classList.add('selected'); li.scrollIntoView({ block:'nearest' }); }

  // 드로어 열자마자 백그라운드에서 AI 조회 시작 (캐시 없을 때만)
  if (!aiCache[d.name]) {
    fetchLatestSanctions(d.name, iso, false);
  }
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
  d3.selectAll('.country-path').classed('highlighted', false);
  document.querySelectorAll('.country-item').forEach(el => el.classList.remove('selected'));
  selectedCountry = null;
}

function switchTab(idx) {
  document.querySelectorAll('.dtab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('.tab-pane').forEach((p,i) => p.classList.toggle('active', i===idx));
}

function renderDrawer(d) {
  const cat = getCategory(d);
  const catLabel = { both:'UN + 미국 동시 제재', un:'UN 단독 제재', us:'미국 단독 제재' }[cat];
  const catColor = { both:'var(--both-color)', un:'var(--un-color)', us:'var(--us-color)' }[cat];
  const catBg = { both:'rgba(196,77,255,0.1)', un:'rgba(59,158,255,0.1)', us:'rgba(255,79,79,0.1)' }[cat];

  document.getElementById('drawer-head').innerHTML = `
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
    <span class="drawer-flag">${d.flag}</span>
    <div class="drawer-country">${d.name}</div>
    <span class="drawer-cat" style="color:${catColor}; background:${catBg}; border:1px solid ${catColor}44;">${catLabel}</span>`;

  document.querySelectorAll('.dtab').forEach((t,i) => t.classList.toggle('active', i===0));

  const sevClass = { critical:'sev-critical', high:'sev-high', medium:'sev-medium' }[d.severity];

          <div class="tl-date">${t.date}</div>
          <div class="tl-title">${t.title}</div>
          <div class="tl-desc">${t.desc}</div>
          <span class="tl-issuer" style="color:${typeColor[t.type]};background:${typeBg[t.type]};border:1px solid ${typeColor[t.type]}44">${typeLabel[t.type]}</span>
        </div>`).join('')}
    </div>
  </div>`;

  const tab3 = `<div class="tab-pane">
    ${(d.sources||[]).map(s=>`
      <div class="source-item">
        <div class="source-org">${s.org}</div>
        <span class="source-type" style="background:rgba(0,212,255,0.08);color:var(--accent);border:1px solid rgba(0,212,255,0.2)">${s.type}</span>
        <div class="source-desc">${s.desc}</div>
        <a href="${s.url}" target="_blank" class="source-link">🔗 공식 출처 바로가기 ↗</a>
      </div>`).join('')}
    <div class="disclaimer">※ 본 정보는 참고용이며, 실제 제재 준수 여부는 반드시 공식 출처 및 법률 전문가를 통해 확인하시기 바랍니다.</div>
  </div>`;

  // 탭4: AI 최신 동향 (캐시 있으면 즉시 표시, 없으면 로딩 후 자동 조회)
  const cachedHtml = aiCache[d.name];
  const tab4 = `<div class="tab-pane" id="tab-ai">
    <div class="ai-update-bar">
      <div class="ai-update-label">
        <div class="ai-dot" id="ai-dot"></div>
        <span id="ai-status-label">Claude AI · 웹 검색 기반 실시간 분석</span>
      </div>
      <button class="btn-ai-refresh" id="btn-ai-refresh" onclick="fetchLatestSanctions('${d.name}', '${selectedCountry}', true)">
        <span class="spin">↻</span> 새로고침
      </button>
    </div>
    <div id="ai-result-area">
      ${cachedHtml || `<div class="ai-loading-box" id="ai-loading">
        <div class="ai-loading-spinner"></div>
        <div class="ai-loading-text">${d.name} 최신 제재 동향 검색 중...</div>
      </div>`}
    </div>
  </div>`;

  document.getElementById('drawer-body').innerHTML = tab0 + tab1 + tab2 + tab3 + tab4;
}

// ── AI 최신 제재 동향 조회 ──
async function fetchLatestSanctions(countryName, iso, forceRefresh) {
  const btn = document.getElementById('btn-ai-refresh');
  const dot = document.getElementById('ai-dot');
  const area = document.getElementById('ai-result-area');
  const statusLabel = document.getElementById('ai-status-label');
  if (!area) return;

  // 강제 새로고침이면 캐시 삭제
  if (forceRefresh) delete aiCache[countryName];

  // 이미 캐시 있으면 스킵
  if (!forceRefresh && aiCache[countryName]) return;

  // 로딩 상태
  if (btn) { btn.disabled = true; btn.classList.add('spinning'); }
  if (dot) dot.classList.add('loading');
  if (statusLabel) statusLabel.textContent = '최신 정보 검색 중...';
  area.innerHTML = `<div class="ai-loading-box">
    <div class="ai-loading-spinner"></div>
    <div class="ai-loading-text">${countryName} 최신 제재 동향 분석 중...</div>
  </div>`;

  const today = new Date().toLocaleDateString('ko-KR', {year:'numeric',month:'long',day:'numeric'});

  const prompt = `오늘 날짜는 ${today}입니다. 당신은 국제 제재 전문 분석가입니다.
웹 검색을 활용하여 ${countryName}에 대한 최신 제재 동향을 조사하고 분석해주세요.
특히 최근 1년 이내의 변화에 집중하되, 중요한 과거 사건도 포함하세요.

반드시 아래 JSON 형식으로만 응답하세요. 마크다운 코드블록 없이 순수 JSON만 출력:
{
  "updatedAt": "2026년 3월",
  "headline": "현재 제재 상황 핵심 요약 2~3문장. 가장 최근 상황을 반영하세요.",
  "recentNews": [
    {
      "date": "2026.02",
      "title": "구체적인 뉴스 제목",
      "desc": "2~3문장 상세 설명. 어떤 기관이 어떤 조치를 취했는지 구체적으로.",
      "type": "신규제재 또는 제재완화 또는 집행조치 또는 정책변화 또는 외교동향",
      "issuer": "미국 OFAC 또는 EU 또는 UN 안보리 등"
    }
  ],
  "timeline": [
    {
      "date": "2026.02",
      "title": "사건 제목",
      "desc": "1~2문장 설명",
      "type": "us 또는 un 또는 both"
    }
  ],
  "keyChanges": ["변화사항1", "변화사항2", "변화사항3"],
  "complianceAlert": "현재 가장 중요한 컴플라이언스 주의사항 한 문장"
}

recentNews는 최신 순으로 5~7개, timeline은 최신 순으로 6~8개 포함하세요.
반드시 실제 검색한 최신 정보만 사용하고, 없으면 알려진 최신 사실을 기반으로 작성하세요.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();

    // 텍스트 블록만 추출
    const text = (data.content || [])
      .filter(b => b.type === 'text')
      .map(b => b.text).join('');

    let parsed;
    try {
      const clean = text.replace(/```json|```/g, '').trim();
      parsed = JSON.parse(clean);
    } catch(e) {
      throw new Error('응답 파싱 실패');
    }

    const html = renderAiResult(parsed, countryName);
    aiCache[countryName] = html;

    const resultArea = document.getElementById('ai-result-area');
    if (resultArea) resultArea.innerHTML = html;
    if (statusLabel) statusLabel.textContent = `마지막 업데이트: ${parsed.updatedAt || today}`;

    // 제재 일지 탭도 최신 타임라인으로 교체
    if (parsed.timeline && parsed.timeline.length > 0) {
      const typeColor = { un:'var(--un-color)', us:'var(--us-color)', both:'var(--both-color)' };
      const typeBg = { un:'rgba(59,158,255,0.1)', us:'rgba(255,79,79,0.1)', both:'rgba(196,77,255,0.1)' };
      const typeLabel = { un:'UN', us:'미국', both:'UN·미국' };
      const tlPane = document.querySelector('#drawer-body .tab-pane:nth-child(3)');
      if (tlPane) {
        tlPane.innerHTML = `
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:14px;padding:8px 10px;background:rgba(0,212,255,0.06);border:1px solid rgba(0,212,255,0.2);">
            <span style="font-size:9px;font-family:var(--mono);color:var(--accent)">✦ AI가 최신 정보로 업데이트함 · ${parsed.updatedAt}</span>
          </div>
          <div class="timeline">
            ${parsed.timeline.map(t => `
              <div class="tl-item">
                <div class="tl-dot ${t.type || 'us'}"></div>
                <div class="tl-date">${t.date}</div>
                <div class="tl-title">${t.title}</div>
                <div class="tl-desc">${t.desc}</div>
                <span class="tl-issuer" style="color:${typeColor[t.type]||typeColor.us};background:${typeBg[t.type]||typeBg.us};border:1px solid ${typeColor[t.type]||typeColor.us}44">${typeLabel[t.type]||'제재'}</span>
              </div>`).join('')}
          </div>`;
      }
    }

  } catch(err) {
    const resultArea = document.getElementById('ai-result-area');
    if (resultArea) resultArea.innerHTML = `
      <div style="padding:20px; background:rgba(255,79,79,0.05); border:1px solid rgba(255,79,79,0.2); font-size:12px; color:var(--text2); line-height:1.6;">
        <div style="color:var(--us-color); font-family:var(--mono); font-size:10px; margin-bottom:8px;">⚠ 조회 실패</div>
        ${err.message === '응답 파싱 실패' ? '일시적인 오류가 발생했습니다. 잠시 후 새로고침을 시도해주세요.' : '네트워크 연결을 확인하고 다시 시도해주세요.'}
        <br><br>
        <button onclick="fetchLatestSanctions('${countryName}', '${iso}', true)" style="padding:5px 14px; background:transparent; border:1px solid var(--border2); color:var(--text2); font-family:var(--mono); font-size:10px; cursor:pointer;">↻ 다시 시도</button>
      </div>`;
    if (statusLabel) statusLabel.textContent = 'Claude AI · 웹 검색 기반 실시간 분석';
  } finally {
    const b = document.getElementById('btn-ai-refresh');
    const d2 = document.getElementById('ai-dot');
    if (b) { b.disabled = false; b.classList.remove('spinning'); }
    if (d2) d2.classList.remove('loading');
  }
}

function renderAiResult(data, countryName) {
  const typeStyle = {
    '신규제재':   { color:'var(--us-color)',   bg:'rgba(255,79,79,0.1)',   border:'rgba(255,79,79,0.3)' },
    '제재완화':   { color:'var(--un-color)',   bg:'rgba(59,158,255,0.1)', border:'rgba(59,158,255,0.3)' },
    '집행조치':   { color:'var(--both-color)', bg:'rgba(196,77,255,0.1)', border:'rgba(196,77,255,0.3)' },
    '정책변화':   { color:'var(--accent3,#ffd60a)', bg:'rgba(255,214,10,0.1)', border:'rgba(255,214,10,0.3)' },
    '외교동향':   { color:'var(--accent)',     bg:'rgba(0,212,255,0.08)', border:'rgba(0,212,255,0.2)' },
  };

  const newsHtml = (data.recentNews || []).map(n => {
    const ts = typeStyle[n.type] || typeStyle['외교동향'];
    return `<div class="ai-news-item">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
        <div class="ai-news-date">${n.date} · ${n.issuer}</div>
        <span class="ai-tag" style="color:${ts.color};background:${ts.bg};border:1px solid ${ts.border}">${n.type}</span>
      </div>
      <div class="ai-news-title">${n.title}</div>
      <div class="ai-news-desc">${n.desc}</div>
    </div>`;
  }).join('');

  const changesHtml = (data.keyChanges || []).map(c =>
    `<div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2);">
      <span style="color:var(--accent);font-family:var(--mono);flex-shrink:0;">→</span>${c}
    </div>`
  ).join('');

  return `
    <div class="ai-section">
      <div class="ai-section-title">// 현황 요약</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.75;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent);">
        ${data.headline}
      </div>
    </div>
    <div class="ai-section">
      <div class="ai-section-title">// 최신 뉴스 & 동향</div>
      ${newsHtml}
    </div>
    ${data.keyChanges?.length ? `
    <div class="ai-section">
      <div class="ai-section-title">// 주요 변화사항</div>
      <div style="background:var(--surface2);border:1px solid var(--border);padding:4px 14px;">${changesHtml}</div>
    </div>` : ''}
    ${data.complianceAlert ? `
    <div style="padding:12px 14px;background:rgba(255,79,79,0.05);border:1px solid rgba(255,79,79,0.2);border-left:3px solid var(--us-color);margin-bottom:16px;">
      <div style="font-family:var(--mono);font-size:9px;color:var(--us-color);letter-spacing:0.15em;margin-bottom:5px;">⚠ COMPLIANCE ALERT</div>
      <div style="font-size:12px;color:var(--text2);line-height:1.6;">${data.complianceAlert}</div>
    </div>` : ''}
    <div class="ai-updated-at">✦ Claude AI + Web Search · ${data.updatedAt}</div>
    <div class="disclaimer">※ AI 분석 결과는 참고용입니다. 실제 제재 준수 여부는 반드시 공식 출처와 법률 전문가를 통해 확인하세요.</div>`;
}

// ── 사이드바 ──
function buildList() {
  const list = document.getElementById('country-list');
  const sorted = Object.entries(sanctionData).sort((a,b) => {
    const o = {both:0,un:1,us:2};
    return o[getCategory(a[1])] - o[getCategory(b[1])] || a[1].name.localeCompare(b[1].name,'ko');
  });
  list.innerHTML = sorted.map(([iso,d]) => {
    const vis = isVisible(d);
    return `<div class="country-item${selectedCountry===iso?' selected':''}" id="li-${iso}" onclick="openDrawer('${iso}')" style="${vis?'':'opacity:0.2;pointer-events:none'}">
      <span class="country-flag">${d.flag}</span>
      <span>${d.name}</span>
      <span class="country-badges">${d.un?'<span class="badge badge-un">UN</span>':''}${d.us?'<span class="badge badge-us">US</span>':''}</span>
    </div>`;
  }).join('');
  const total = Object.values(sanctionData);
  document.getElementById('un-count').textContent = total.filter(d=>d.un).length;
  document.getElementById('us-count').textContent = total.filter(d=>d.us).length;
  document.getElementById('both-count').textContent = total.filter(d=>d.un&&d.us).length;
  document.getElementById('fc-both').textContent = total.filter(d=>d.un&&d.us).length;
  document.getElementById('fc-un').textContent = total.filter(d=>d.un&&!d.us).length;
  document.getElementById('fc-us').textContent = total.filter(d=>!d.un&&d.us).length;
  document.getElementById('visible-count').textContent = total.filter(d=>isVisible(d)).length;
}

function setFilter(type) {
  activeFilters[type] = !activeFilters[type];
  document.getElementById(`btn-${type}`).classList.toggle('active', activeFilters[type]);
  updateMapColors(); buildList();
}
function setView(v) {
  currentView = v;
  document.querySelectorAll('.vt-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`vt-${v==='all'?'all':v==='un_only'?'un':'us'}`).classList.add('active');
  updateMapColors(); buildList();
}

// ── D3 MAP ──
const svg = d3.select('#map-svg');
let projection, path, zoom, g;
const numToAlpha3 = {"408":"PRK","364":"IRN","729":"SDN","706":"SOM","180":"COD","140":"CAF","466":"MLI","624":"GNB","434":"LBY","887":"YEM","728":"SSD","332":"HTI","324":"GIN","232":"ERI","192":"CUB","760":"SYR","643":"RUS","112":"BLR","104":"MMR","862":"VEN","558":"NIC","716":"ZWE"};

function initMap() {
  const W = document.getElementById('map-area').clientWidth;
  const H = document.getElementById('map-area').clientHeight;
  projection = d3.geoNaturalEarth1().scale(W/6.1).translate([W/2,H/2]);
  path = d3.geoPath().projection(projection);
  zoom = d3.zoom().scaleExtent([0.5,10]).on('zoom', e=>g.attr('transform',e.transform));
  svg.attr('width',W).attr('height',H).call(zoom);
  svg.append('rect').attr('width',W).attr('height',H).attr('fill','#07090e');
  g = svg.append('g');
  g.append('path').datum(d3.geoGraticule()()).attr('d',path).attr('fill','none').attr('stroke','#0d1825').attr('stroke-width',0.4);
  fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
    .then(r=>r.json())
    .then(world=>{
      const countries = topojson.feature(world, world.objects.countries);
      const tooltip = document.getElementById('tooltip');
      g.selectAll('.country-path').data(countries.features).enter().append('path')
        .attr('class', d=>{ const iso=numToAlpha3[d.id]; const sd=iso?sanctionData[iso]:null; return `country-path ${getCategory(sd)}-sanction`; })
        .attr('id', d=>{ const iso=numToAlpha3[d.id]; return iso?`c-${iso}`:null; })
        .attr('d', path)
        .on('mousemove', function(event,d){
          const iso=numToAlpha3[d.id]; const sd=iso?sanctionData[iso]:null;
          if(!sd){tooltip.classList.remove('show');return;}
          const cat=getCategory(sd);
          const cc={both:'var(--both-color)',un:'var(--un-color)',us:'var(--us-color)'}[cat];
          document.getElementById('tt-name').textContent=`${sd.flag} ${sd.name}`;
          document.getElementById('tt-badges').innerHTML=`${sd.un?'<span class="badge badge-un">UN</span>':''}${sd.us?'<span class="badge badge-us">US</span>':''}`;
          document.getElementById('tt-desc').innerHTML=`<span style="color:${cc}">${cat==='both'?'UN + 미국 동시':cat==='un'?'UN 단독':'미국 단독'}</span><br>${sd.sectors.slice(0,3).join(' · ')}`;
          const rect=document.getElementById('map-area').getBoundingClientRect();
          let x=event.clientX-rect.left+14, y=event.clientY-rect.top-10;
          if(x+230>rect.width) x-=244;
          tooltip.style.left=x+'px'; tooltip.style.top=y+'px'; tooltip.classList.add('show');
        })
        .on('mouseleave',()=>tooltip.classList.remove('show'))
        .on('click',(event,d)=>{ const iso=numToAlpha3[d.id]; if(iso&&sanctionData[iso]) openDrawer(iso); });
      updateMapColors();
    }).catch(()=>{
      g.append('text').attr('x',100).attr('y',100).attr('fill','#6b7a99').attr('font-size',14).text('지도 데이터 로드 오류 — 인터넷 연결을 확인하세요');
    });
}

function updateMapColors() {
  d3.selectAll('.country-path').each(function(d){
    const iso=d?numToAlpha3[d.id]:null; const sd=iso?sanctionData[iso]:null;
    const vis=sd&&isVisible(sd); const cat=getCategory(sd);
    this.className.baseVal=`country-path ${vis?cat:'neutral'}-sanction`;
    if(iso===selectedCountry&&vis) this.classList.add('highlighted');
  });
}

function zoomIn(){svg.transition().call(zoom.scaleBy,1.5);}
function zoomOut(){svg.transition().call(zoom.scaleBy,0.67);}
function resetZoom(){svg.transition().call(zoom.transform,d3.zoomIdentity);}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer();});
buildList();
window.addEventListener('load',initMap);
window.addEventListener('resize',()=>{
  const W=document.getElementById('map-area').clientWidth, H=document.getElementById('map-area').clientHeight;
  svg.attr('width',W).attr('height',H);
  projection.scale(W/6.1).translate([W/2,H/2]);
  path=d3.geoPath().projection(projection);
  d3.selectAll('.country-path').attr('d',path);
});
</script>

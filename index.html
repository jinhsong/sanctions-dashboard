<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>글로벌 제재 지도</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
:root {
  --bg:#080a0f; --sur:#0d1017; --sur2:#131820;
  --bor:#1a2035; --bor2:#243050;
  --txt:#d4dae8; --txt2:#6b7a99; --txt3:#2e3a55;
  --un:#3b9eff; --us:#ff4f4f; --both:#c44dff;
  --neutral:#1a2240; --ocean:#07090e; --acc:#00d4ff;
  --mono:'IBM Plex Mono',monospace; --sans:'Noto Sans KR',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--txt);font-family:var(--sans);min-height:100vh;overflow-x:hidden;}

/* HEADER */
header{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(8,10,15,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--bor);padding:0 20px;height:56px;display:flex;align-items:center;gap:16px;}
.logo{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px;letter-spacing:.08em;flex-shrink:0;}
.logo-box{width:26px;height:26px;border:1.5px solid var(--acc);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--acc);font-weight:600;position:relative;overflow:hidden;}
.logo-box::after{content:'';position:absolute;inset:0;background:var(--acc);opacity:.08;}
.logo span{color:var(--acc);}
.live-badge{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;color:var(--txt2);letter-spacing:.1em;flex-shrink:0;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#3bff8a;animation:livepulse 2s infinite;}
@keyframes livepulse{0%,100%{box-shadow:0 0 0 0 rgba(59,255,138,.5);}50%{box-shadow:0 0 0 5px rgba(59,255,138,0);}}

/* LAYOUT */
.layout{display:flex;height:100vh;padding-top:56px;}
.sidebar{width:280px;flex-shrink:0;background:var(--sur);border-right:1px solid var(--bor);overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--bor2);}
.sb-sec{padding:14px 18px;border-bottom:1px solid var(--bor);}
.sec-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.2em;color:var(--txt3);text-transform:uppercase;margin-bottom:10px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.stat-card{background:var(--sur2);border:1px solid var(--bor);padding:9px;}
.stat-num{font-family:var(--mono);font-size:18px;font-weight:600;line-height:1;margin-bottom:3px;}
.stat-lbl{font-size:10px;color:var(--txt2);}
.filter-group{display:flex;flex-direction:column;gap:4px;}
.fbtn{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--bor);background:var(--sur2);cursor:pointer;transition:all .2s;font-size:11px;color:var(--txt2);width:100%;text-align:left;}
.fbtn.on{color:var(--txt);border-color:var(--bor2);}
.fbtn.on.both{border-left:3px solid var(--both);}
.fbtn.on.un{border-left:3px solid var(--un);}
.fbtn.on.us{border-left:3px solid var(--us);}
.fdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.fdot-both{background:var(--both);box-shadow:0 0 5px rgba(196,77,255,.6);}
.fdot-un{background:var(--un);box-shadow:0 0 5px rgba(59,158,255,.6);}
.fdot-us{background:var(--us);box-shadow:0 0 5px rgba(255,79,79,.6);}
.fcnt{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--txt2);}
.clist{display:flex;flex-direction:column;}
.citem{display:flex;align-items:center;gap:7px;padding:8px 18px;border-bottom:1px solid var(--bor);cursor:pointer;transition:all .15s;font-size:11px;color:var(--txt2);}
.citem:hover{color:var(--txt);background:rgba(255,255,255,.02);padding-left:22px;}
.citem.on{color:var(--txt);background:rgba(255,255,255,.025);padding-left:22px;border-left:2px solid var(--acc);}
.cflag{font-size:13px;}
.cbadges{margin-left:auto;display:flex;gap:2px;}
.badge{padding:1px 4px;font-size:7px;font-family:var(--mono);border-radius:1px;}
.badge-un{background:rgba(59,158,255,.15);color:var(--un);border:1px solid rgba(59,158,255,.3);}
.badge-us{background:rgba(255,79,79,.15);color:var(--us);border:1px solid rgba(255,79,79,.3);}

/* MAP */
.map-area{flex:1;position:relative;overflow:hidden;background:var(--ocean);}
#map-svg{width:100%;height:100%;cursor:grab;}
#map-svg:active{cursor:grabbing;}
.country-path{stroke:#0d1825;stroke-width:.5;transition:opacity .15s;}
.country-path.un-sanction{fill:var(--un);opacity:.75;}
.country-path.us-sanction{fill:var(--us);opacity:.75;}
.country-path.both-sanction{fill:var(--both);opacity:.8;}
.country-path.neutral-sanction{fill:var(--neutral);opacity:1;}
.country-path:hover{opacity:1!important;stroke:rgba(255,255,255,.4);stroke-width:1;}
.country-path.hl{opacity:1!important;stroke:#fff;stroke-width:1.5;}
.map-legend{position:absolute;bottom:20px;left:20px;background:rgba(8,10,15,.88);backdrop-filter:blur(12px);border:1px solid var(--bor);padding:10px 12px;}
.leg-title{font-family:var(--mono);font-size:8px;letter-spacing:.2em;color:var(--txt3);text-transform:uppercase;margin-bottom:7px;}
.leg-item{display:flex;align-items:center;gap:7px;font-size:10px;color:var(--txt2);margin-bottom:4px;}
.leg-item:last-child{margin-bottom:0;}
.leg-sw{width:10px;height:10px;border-radius:1px;flex-shrink:0;}
.map-ctrls{position:absolute;bottom:20px;right:20px;display:flex;flex-direction:column;gap:3px;}
.map-btn{width:30px;height:30px;background:rgba(8,10,15,.88);backdrop-filter:blur(12px);border:1px solid var(--bor);color:var(--txt2);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.map-btn:hover{color:var(--txt);border-color:var(--bor2);}
.map-topbar{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:rgba(8,10,15,.8);backdrop-filter:blur(12px);border:1px solid var(--bor);padding:6px 16px;font-family:var(--mono);font-size:10px;color:var(--txt2);white-space:nowrap;}
.map-topbar b{color:var(--txt);}
.view-toggle{position:absolute;top:14px;right:14px;display:flex;gap:2px;}
.vtbtn{padding:5px 12px;font-family:var(--mono);font-size:9px;letter-spacing:.1em;background:rgba(8,10,15,.88);border:1px solid var(--bor);color:var(--txt2);cursor:pointer;transition:all .15s;}
.vtbtn.on{color:var(--acc);border-color:var(--acc);background:rgba(0,212,255,.05);}

/* Tooltip */
.tip{position:absolute;pointer-events:none;background:rgba(8,10,15,.95);backdrop-filter:blur(12px);border:1px solid var(--bor2);padding:9px 12px;display:none;z-index:300;max-width:210px;}
.tip.show{display:block;}
.tt-name{font-size:12px;font-weight:600;margin-bottom:5px;}
.tt-badges{display:flex;gap:3px;margin-bottom:4px;}
.tt-desc{font-size:10px;color:var(--txt2);line-height:1.5;}
.tt-hint{font-size:9px;color:var(--acc);margin-top:5px;font-family:var(--mono);opacity:.7;}

/* DRAWER */
.drw-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:400;opacity:0;pointer-events:none;transition:opacity .3s;}
.drw-overlay.open{opacity:1;pointer-events:all;}
.drawer{position:fixed;top:56px;right:0;bottom:0;width:500px;max-width:92vw;background:var(--sur);border-left:1px solid var(--bor2);z-index:500;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden;}
.drawer.open{transform:translateX(0);}
.drw-head{padding:20px 24px 16px;border-bottom:1px solid var(--bor);flex-shrink:0;position:relative;}
.drw-close{position:absolute;top:16px;right:16px;width:28px;height:28px;background:var(--sur2);border:1px solid var(--bor2);color:var(--txt2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.drw-close:hover{color:var(--txt);}
.drw-flag{font-size:28px;margin-bottom:7px;display:block;}
.drw-name{font-size:19px;font-weight:700;letter-spacing:-.02em;margin-bottom:7px;}
.drw-cat{display:inline-block;padding:2px 9px;font-family:var(--mono);font-size:9px;letter-spacing:.1em;border-radius:2px;}
.drw-tabs{display:flex;border-bottom:1px solid var(--bor);flex-shrink:0;}
.dtab{flex:1;padding:10px 4px;text-align:center;font-size:10px;color:var(--txt2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;font-family:var(--mono);}
.dtab:hover{color:var(--txt);}
.dtab.on{color:var(--acc);border-bottom-color:var(--acc);}
.drw-body{flex:1;overflow-y:auto;padding:20px 22px;}
.drw-body::-webkit-scrollbar{width:3px;}
.drw-body::-webkit-scrollbar-thumb{background:var(--bor2);}

/* Tab panes - CRITICAL: hidden by default, shown when .on */
.tab-pane{display:none;}
.tab-pane.on{display:block;}

/* Overview tab */
.ov-summary{font-size:12px;color:var(--txt2);line-height:1.75;padding:12px 14px;background:var(--sur2);border:1px solid var(--bor);margin-bottom:16px;border-left:3px solid var(--acc);}
.info-block{margin-bottom:18px;}
.ib-title{font-family:var(--mono);font-size:8px;letter-spacing:.2em;color:var(--txt3);text-transform:uppercase;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--bor);}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid rgba(26,32,53,.6);gap:14px;}
.info-row:last-child{border-bottom:none;}
.ikey{font-size:10px;color:var(--txt2);flex-shrink:0;min-width:74px;}
.ival{font-size:11px;color:var(--txt);text-align:right;line-height:1.5;}
.stags{display:flex;flex-wrap:wrap;gap:3px;justify-content:flex-end;}
.stag{padding:2px 6px;font-size:9px;font-family:var(--mono);background:rgba(0,212,255,.07);color:var(--acc);border:1px solid rgba(0,212,255,.2);border-radius:2px;}
.sev-badge{padding:2px 9px;font-family:var(--mono);font-size:10px;border-radius:2px;font-weight:600;}
.sev-critical{background:rgba(255,79,79,.15);color:var(--us);border:1px solid rgba(255,79,79,.3);}
.sev-high{background:rgba(255,140,66,.15);color:#ff8c42;border:1px solid rgba(255,140,66,.3);}
.sev-medium{background:rgba(255,214,10,.15);color:#ffd60a;border:1px solid rgba(255,214,10,.3);}

/* Sanctions tab */
.sblk{background:var(--sur2);border:1px solid var(--bor);padding:15px;margin-bottom:12px;position:relative;overflow:hidden;}
.sblk::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;}
.sblk.un::before{background:var(--un);}
.sblk.us::before{background:var(--us);}
.sb-hd{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px;}
.sb-ico{font-size:16px;flex-shrink:0;}
.sb-ttl{font-size:12px;font-weight:600;margin-bottom:2px;}
.sb-sub{font-size:9px;font-family:var(--mono);color:var(--txt2);}
.sb-desc{font-size:11px;color:var(--txt2);line-height:1.7;margin-bottom:12px;}
.sb-rows{display:flex;flex-direction:column;gap:5px;}
.sb-row{display:flex;gap:8px;font-size:10px;}
.sbk{color:var(--txt3);font-family:var(--mono);width:65px;flex-shrink:0;padding-top:1px;}
.sbv{color:var(--txt2);line-height:1.5;}

/* Timeline tab */
.tl-header{display:flex;align-items:center;gap:6px;margin-bottom:14px;padding:7px 10px;font-family:var(--mono);font-size:9px;color:var(--txt2);}
.tl-header.ai-updated{background:rgba(59,255,138,.04);border:1px solid rgba(59,255,138,.18);color:#3bff8a;}
.tl-header.static{background:var(--sur2);border:1px solid var(--bor);}
.timeline{position:relative;padding-left:20px;}
.timeline::before{content:'';position:absolute;left:5px;top:6px;bottom:6px;width:1px;background:var(--bor2);}
.tl-item{position:relative;margin-bottom:18px;}
.tl-item:last-child{margin-bottom:0;}
.tl-dot{position:absolute;left:-18px;top:4px;width:9px;height:9px;border-radius:50%;border:2px solid var(--bg);}
.tl-dot.un{background:var(--un);box-shadow:0 0 5px rgba(59,158,255,.5);}
.tl-dot.us{background:var(--us);box-shadow:0 0 5px rgba(255,79,79,.5);}
.tl-dot.both{background:var(--both);box-shadow:0 0 5px rgba(196,77,255,.5);}
.tl-date{font-family:var(--mono);font-size:9px;color:var(--txt3);margin-bottom:2px;}
.tl-ttl{font-size:12px;font-weight:500;color:var(--txt);margin-bottom:4px;}
.tl-desc{font-size:11px;color:var(--txt2);line-height:1.6;}
.tl-tag{display:inline-block;margin-top:5px;padding:1px 6px;font-size:8px;font-family:var(--mono);border-radius:1px;}

/* Sources tab */
.src-item{background:var(--sur2);border:1px solid var(--bor);padding:12px 14px;margin-bottom:8px;transition:border-color .15s;}
.src-item:hover{border-color:var(--bor2);}
.src-item:last-child{margin-bottom:0;}
.src-org{font-size:12px;font-weight:600;margin-bottom:3px;}
.src-type{display:inline-block;padding:1px 6px;font-size:8px;font-family:var(--mono);border-radius:1px;margin-bottom:6px;}
.src-desc{font-size:10px;color:var(--txt2);line-height:1.6;margin-bottom:8px;}
.src-link{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:9px;color:var(--acc);text-decoration:none;padding:4px 10px;border:1px solid rgba(0,212,255,.25);background:rgba(0,212,255,.05);transition:all .15s;}
.src-link:hover{background:rgba(0,212,255,.12);border-color:rgba(0,212,255,.5);}
.disclaimer{margin-top:14px;padding:10px 12px;background:var(--sur2);border:1px solid var(--bor);font-size:9px;color:var(--txt3);line-height:1.6;font-family:var(--mono);}

/* AI 최신 탭 */
.ai-panel{display:flex;flex-direction:column;gap:0;}
.ai-keybar{padding:12px 14px;background:rgba(0,212,255,.04);border:1px solid rgba(0,212,255,.2);margin-bottom:14px;}
.ai-keybar-title{font-family:var(--mono);font-size:9px;color:var(--acc);letter-spacing:.1em;margin-bottom:8px;}
.ai-keybar-row{display:flex;gap:6px;align-items:center;}
.ai-keyinput{flex:1;background:var(--sur2);border:1px solid var(--bor2);color:var(--txt);font-family:var(--mono);font-size:11px;padding:6px 10px;outline:none;transition:border-color .15s;}
.ai-keyinput:focus{border-color:rgba(0,212,255,.5);}
.ai-keybtn{padding:6px 14px;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.4);color:var(--acc);font-family:var(--mono);font-size:10px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.ai-keybtn:hover{background:rgba(0,212,255,.2);}
.ai-keybtn:disabled{opacity:.4;cursor:not-allowed;}
.ai-status-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:6px 10px;background:rgba(0,212,255,.03);border:1px solid rgba(0,212,255,.1);}
.ai-status-left{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9px;color:var(--txt2);}
.ai-pulse{width:6px;height:6px;border-radius:50%;background:var(--acc);}
.ai-pulse.spin{animation:aispin 1s infinite;}
@keyframes aispin{0%,100%{opacity:1;}50%{opacity:.2;}}
.ai-refresh-btn{display:flex;align-items:center;gap:4px;padding:4px 10px;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.3);color:var(--acc);font-family:var(--mono);font-size:9px;cursor:pointer;transition:all .15s;}
.ai-refresh-btn:hover:not(:disabled){background:rgba(0,212,255,.16);}
.ai-refresh-btn:disabled{opacity:.4;cursor:not-allowed;}
.ai-refresh-ico{display:inline-block;}
.spinning .ai-refresh-ico{animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.ai-result{flex:1;}
.ai-loading{display:flex;flex-direction:column;align-items:center;gap:12px;padding:40px 0;}
.ai-spinner{width:28px;height:28px;border:2px solid var(--bor2);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;}
.ai-loading-txt{font-family:var(--mono);font-size:11px;color:var(--txt2);}
.ai-sec{margin-bottom:18px;}
.ai-sec-ttl{font-family:var(--mono);font-size:8px;letter-spacing:.2em;color:var(--txt3);text-transform:uppercase;margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid var(--bor);}
.ai-headline{font-size:12px;color:var(--txt2);line-height:1.75;padding:11px 13px;background:var(--sur2);border:1px solid var(--bor);border-left:3px solid var(--acc);}
.ai-news{background:var(--sur2);border:1px solid var(--bor);padding:11px 13px;margin-bottom:8px;transition:border-color .15s;}
.ai-news:hover{border-color:var(--bor2);}
.ai-news:last-child{margin-bottom:0;}
.ai-news-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.ai-news-meta{font-family:var(--mono);font-size:9px;color:var(--txt3);}
.ai-ntag{padding:1px 6px;font-size:9px;font-family:var(--mono);border-radius:1px;}
.ai-news-ttl{font-size:12px;font-weight:600;color:var(--txt);margin-bottom:4px;line-height:1.4;}
.ai-news-desc{font-size:11px;color:var(--txt2);line-height:1.6;}
.ai-changes-item{display:flex;gap:7px;padding:5px 0;border-bottom:1px solid var(--bor);font-size:11px;color:var(--txt2);}
.ai-changes-item:last-child{border-bottom:none;}
.ai-changes-arrow{color:var(--acc);font-family:var(--mono);flex-shrink:0;}
.ai-alert{padding:11px 13px;background:rgba(255,79,79,.05);border:1px solid rgba(255,79,79,.2);border-left:3px solid var(--us);margin-bottom:14px;}
.ai-alert-lbl{font-family:var(--mono);font-size:8px;color:var(--us);letter-spacing:.15em;margin-bottom:4px;}
.ai-alert-txt{font-size:11px;color:var(--txt2);line-height:1.6;}
.ai-updated{font-family:var(--mono);font-size:9px;color:var(--txt3);text-align:right;margin-top:8px;}
.ai-error{padding:16px;background:rgba(255,79,79,.05);border:1px solid rgba(255,79,79,.2);}
.ai-error-title{font-family:var(--mono);font-size:9px;color:var(--us);margin-bottom:8px;}
.ai-error-msg{font-size:11px;color:var(--txt2);line-height:1.6;margin-bottom:12px;}
.ai-retry-btn{padding:5px 14px;background:transparent;border:1px solid var(--bor2);color:var(--txt2);font-family:var(--mono);font-size:10px;cursor:pointer;}
.ai-retry-btn:hover{border-color:var(--bor2);color:var(--txt);}
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-box">SX</div>SANCTION<span>MAP</span></div>
  <div class="live-badge"><div class="live-dot"></div>GLOBAL SANCTIONS TRACKER</div>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-sec">
      <div class="sec-lbl">// 제재 현황</div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-num" style="color:var(--un)" id="cnt-un">-</div><div class="stat-lbl">🇺🇳 UN 제재</div></div>
        <div class="stat-card"><div class="stat-num" style="color:var(--us)" id="cnt-us">-</div><div class="stat-lbl">🇺🇸 미국 제재</div></div>
        <div class="stat-card" style="grid-column:span 2"><div class="stat-num" style="color:var(--both)" id="cnt-both">-</div><div class="stat-lbl">🔴 UN + 미국 동시</div></div>
      </div>
    </div>
    <div class="sb-sec">
      <div class="sec-lbl">// 필터</div>
      <div class="filter-group">
        <button class="fbtn on both" id="fbtn-both" onclick="toggleFilter('both')"><div class="fdot fdot-both"></div>UN + 미국 동시<span class="fcnt" id="fc-both"></span></button>
        <button class="fbtn on un" id="fbtn-un" onclick="toggleFilter('un')"><div class="fdot fdot-un"></div>UN 단독<span class="fcnt" id="fc-un"></span></button>
        <button class="fbtn on us" id="fbtn-us" onclick="toggleFilter('us')"><div class="fdot fdot-us"></div>미국 단독<span class="fcnt" id="fc-us"></span></button>
      </div>
    </div>
    <div style="padding:10px 18px 7px;border-bottom:1px solid var(--bor);flex-shrink:0;">

function getCat(d){ if(!d) return 'neutral'; if(d.un&&d.us) return 'both'; if(d.un) return 'un'; if(d.us) return 'us'; return 'neutral'; }
function isVis(d){ if(!d) return false; const c=getCat(d); if(view==='un_only'&&!d.un) return false; if(view==='us_only'&&!d.us) return false; if(c==='neutral') return false; if(!filters[c==='both'?'both':c==='un'?'un':'us']) return false; return true; }

// ── 사이드바 ──
function buildList(){
  const all = Object.values(SD);
  document.getElementById('cnt-un').textContent = all.filter(d=>d.un).length;
  document.getElementById('cnt-us').textContent = all.filter(d=>d.us).length;
  document.getElementById('cnt-both').textContent = all.filter(d=>d.un&&d.us).length;
  document.getElementById('fc-both').textContent = all.filter(d=>d.un&&d.us).length;
  document.getElementById('fc-un').textContent = all.filter(d=>d.un&&!d.us).length;
  document.getElementById('fc-us').textContent = all.filter(d=>!d.un&&d.us).length;
  document.getElementById('vis-cnt').textContent = all.filter(isVis).length;
  const order = {both:0,un:1,us:2};
  const sorted = Object.entries(SD).sort((a,b)=> order[getCat(a[1])]-order[getCat(b[1])] || a[1].name.localeCompare(b[1].name,'ko'));
  document.getElementById('clist').innerHTML = sorted.map(([iso,d]) => {
    const hidden = !isVis(d);
    return '<div class="citem'+(currentISO===iso?' on':'')+'" id="ci-'+iso+'" onclick="openDrawer(\''+iso+'\')" '+(hidden?'style="opacity:.2;pointer-events:none"':'')+'>'+
      '<span class="cflag">'+d.flag+'</span><span>'+d.name+'</span>'+
      '<span class="cbadges">'+(d.un?'<span class="badge badge-un">UN</span>':'')+(d.us?'<span class="badge badge-us">US</span>':'')+'</span>'+
    '</div>';
  }).join('');
}

function setView(v){
  view = v;

}

// JSON 파싱 실패 시 필드별 수동 추출 (최후 수단)
function extractFieldsManually(str) {
  try {
    const get = function(key) {
      const re = new RegExp('"'+key+'"\\s*:\\s*"([^"]*)"');
      const m = str.match(re); return m ? m[1] : '';
    };
    const getArr = function(key) {
      const re = new RegExp('"'+key+'"\\s*:\\s*\\[([\\s\\S]*?)\\]');
      const m = str.match(re); if (!m) return [];
      // 배열 안에서 객체 추출
      const objs = [];
      const om = m[1].matchAll(/\{([^}]+)\}/g);
      for (const o of om) {
        const obj = {};
        const pairs = o[1].matchAll(/"(\w+)"\s*:\s*"([^"]*)"/g);
        for (const p of pairs) obj[p[1]] = p[2];
        if (Object.keys(obj).length > 0) objs.push(obj);
      }
      return objs;
    };
    const getStrArr = function(key) {
      const re = new RegExp('"'+key+'"\\s*:\\s*\\[([\\s\\S]*?)\\]');
      const m = str.match(re); if (!m) return [];
      const items = [];
      const im = m[1].matchAll(/"([^"]+)"/g);
      for (const i of im) items.push(i[1]);
      return items;
    };
    return {
      updatedAt: get('updatedAt') || '2026년 3월',
      headline: get('headline') || '최신 제재 정보를 불러왔습니다.',
      recentNews: getArr('recentNews'),
      timeline: getArr('timeline'),
      keyChanges: getStrArr('keyChanges'),
      complianceAlert: get('complianceAlert') || ''
    };
  } catch(e) { return null; }
}

async function doFetch(countryName, iso, force) {
  if (!savedKey) { return; }
  if (force) delete aiCache[iso];
  if (aiCache[iso]) {
    // 캐시 있으면 바로 표시
    const res = document.getElementById('ai-result');
    if (res) res.innerHTML = aiCache[iso];
    return;
  }
  // UI 로딩 상태
  const pulse = document.getElementById('ai-pulse');
  const btn = document.getElementById('ai-refresh');
  const statusTxt = document.getElementById('ai-status-txt');
  const resultArea = document.getElementById('ai-result');
  if (pulse) pulse.classList.add('spin');
  if (btn) { btn.disabled = true; btn.classList.add('spinning'); }
  if (statusTxt) statusTxt.textContent = '최신 정보 검색 중...';
  if (resultArea) resultArea.innerHTML = '<div class="ai-loading"><div class="ai-spinner"></div><div class="ai-loading-txt">'+countryName+' 최신 제재 동향 분석 중...</div></div>';

  const today = new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});
  const prompt = `오늘은 ${today}입니다. 국제 제재 전문 분석가로서 ${countryName}에 대한 최신 제재 동향을 웹 검색으로 조사하세요.

중요 규칙:
- 반드시 유효한 JSON만 출력하세요. 코드블록(\`\`\`)을 절대 사용하지 마세요.
- 문자열 안에 큰따옴표(")가 필요하면 반드시 백슬래시로 이스케이프(\\"로 표기)하세요.
- 문자열 안에 줄바꿈을 넣지 마세요. 한 줄로 이어서 쓰세요.
- 설명(desc)은 짧고 간결하게 1~2문장으로 제한하세요.

출력 형식 (이 구조를 정확히 따르세요):
{
  "updatedAt": "2026년 3월",
  "headline": "현재 상황 요약 2문장 이내",
  "recentNews": [
    {"date": "2026.02", "title": "제목", "desc": "설명 1~2문장", "type": "신규제재", "issuer": "미국 OFAC"},
    {"date": "2026.01", "title": "제목", "desc": "설명 1~2문장", "type": "정책변화", "issuer": "EU"}
  ],
  "timeline": [
    {"date": "2026.02", "title": "사건 제목", "desc": "설명 1문장", "type": "us"},
    {"date": "2025.11", "title": "사건 제목", "desc": "설명 1문장", "type": "un"}
  ],
  "keyChanges": ["최근 변화 1", "최근 변화 2", "최근 변화 3"],
  "complianceAlert": "가장 중요한 컴플라이언스 주의사항 한 문장"
}

type 값 규칙: recentNews는 "신규제재" "제재완화" "집행조치" "정책변화" "외교동향" 중 하나, timeline은 "us" "un" "both" 중 하나.
recentNews 4~6개, timeline 5~7개, 최신 순으로 정렬.`;

  try {
    const resp = await fetch(
      'https://generativelanguage.googleapis.com/v1beta/models/gemini-3-pro:generateContent?key=' + savedKey,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          tools: [{ google_search: {} }],
          generationConfig: { temperature: 0.2, maxOutputTokens: 2000 }
        })
      }
    );

    const data = await resp.json();
    if (data.error) throw new Error(data.error.message || 'API 오류 ('+resp.status+')');

    const text = (data.candidates?.[0]?.content?.parts||[])
      .filter(function(p){ return p.text; })
      .map(function(p){ return p.text; }).join('');
    if (!text) throw new Error('응답 텍스트가 없습니다');

    // JSON 추출 및 복구 시도
    let parsed = null;
    const clean = text.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();
    // 중괄호로 감싸진 JSON 찾기
    const m = clean.match(/\{[\s\S]*\}/);
    if (!m) throw new Error('JSON 형식 응답을 찾을 수 없습니다');
    let jsonStr = m[0];
    // 1차 시도: 그대로 파싱
    try { parsed = JSON.parse(jsonStr); } catch(e1) {
      // 2차 시도: 문자열 내 제어문자 제거 후 재시도
      try {
        const fixed = jsonStr
          .replace(/[\u0000-\u001F\u007F]/g, function(c){ // 제어문자
            const safe = {'\n':'\\n','\r':'\\r','\t':'\\t'};
            return safe[c] !== undefined ? safe[c] : '';
          })
          .replace(/,\s*}/g, '}')   // trailing comma in object
          .replace(/,\s*\]/g, ']'); // trailing comma in array
        parsed = JSON.parse(fixed);
      } catch(e2) {
        // 3차 시도: 필드별 개별 추출 (최후 수단)
        parsed = extractFieldsManually(jsonStr);
        if (!parsed) throw new Error('JSON 파싱 실패: ' + e1.message);
      }
    }

    const html = buildAiResultHtml(parsed);
    aiCache[iso] = html;

    if (currentISO === iso) {
      const res2 = document.getElementById('ai-result');
      if (res2) res2.innerHTML = html;
      const st = document.getElementById('ai-status-txt');
      if (st) st.textContent = '마지막 업데이트: '+(parsed.updatedAt||today);
      // 제재 일지 탭도 갱신
      if (parsed.timeline && parsed.timeline.length > 0) updateTimeline(parsed.timeline, parsed.updatedAt||today);
    }

  } catch(err) {
    console.error('AI 오류:', err);
    if (currentISO === iso) {
      const res3 = document.getElementById('ai-result');
      if (res3) res3.innerHTML =
        '<div class="ai-error">'+
          '<div class="ai-error-title">⚠ 조회 실패</div>'+
          '<div class="ai-error-msg">'+err.message+'<br><br>API 키가 올바른지 확인 후 새로고침 버튼을 눌러주세요.</div>'+
          '<button class="ai-retry-btn" onclick="doFetch(\''+countryName+'\',\''+iso+'\',true)">↻ 다시 시도</button>'+
        '</div>';
      const st2 = document.getElementById('ai-status-txt');
      if (st2) st2.textContent = '오류 발생 — 새로고침 버튼 클릭';
    }
  } finally {
    if (currentISO === iso) {
      const p2 = document.getElementById('ai-pulse');
      const b2 = document.getElementById('ai-refresh');
      if (p2) p2.classList.remove('spin');
      if (b2) { b2.disabled = false; b2.classList.remove('spinning'); }
    }
  }
}

function buildAiResultHtml(data) {
  const ts = {
    '신규제재': {col:'var(--us)',bg:'rgba(255,79,79,.1)',bor:'rgba(255,79,79,.3)'},
    '제재완화': {col:'var(--un)',bg:'rgba(59,158,255,.1)',bor:'rgba(59,158,255,.3)'},
    '집행조치': {col:'var(--both)',bg:'rgba(196,77,255,.1)',bor:'rgba(196,77,255,.3)'},
    '정책변화': {col:'#ffd60a',bg:'rgba(255,214,10,.1)',bor:'rgba(255,214,10,.3)'},
    '외교동향': {col:'var(--acc)',bg:'rgba(0,212,255,.08)',bor:'rgba(0,212,255,.25)'}
  };
  var newsHtml = (data.recentNews||[]).map(function(n){
    var s = ts[n.type]||ts['외교동향'];
    return '<div class="ai-news">'+
      '<div class="ai-news-hd">'+
        '<span class="ai-news-meta">'+n.date+' · '+n.issuer+'</span>'+
        '<span class="ai-ntag" style="color:'+s.col+';background:'+s.bg+';border:1px solid '+s.bor+'">'+n.type+'</span>'+
      '</div>'+
      '<div class="ai-news-ttl">'+n.title+'</div>'+
      '<div class="ai-news-desc">'+n.desc+'</div>'+
    '</div>';
  }).join('');

  var changesHtml = (data.keyChanges||[]).map(function(c){
    return '<div class="ai-changes-item"><span class="ai-changes-arrow">→</span>'+c+'</div>';
  }).join('');

  var alertHtml = data.complianceAlert
    ? '<div class="ai-alert"><div class="ai-alert-lbl">⚠ COMPLIANCE ALERT</div><div class="ai-alert-txt">'+data.complianceAlert+'</div></div>'
    : '';

  return '<div class="ai-sec">'+
    '<div class="ai-sec-ttl">// 현황 요약</div>'+
    '<div class="ai-headline">'+data.headline+'</div>'+
  '</div>'+
  '<div class="ai-sec">'+
    '<div class="ai-sec-ttl">// 최신 뉴스 & 동향</div>'+
    newsHtml+
  '</div>'+
  (changesHtml ? '<div class="ai-sec"><div class="ai-sec-ttl">// 주요 변화사항</div><div style="background:var(--sur2);border:1px solid var(--bor);padding:4px 12px;">'+changesHtml+'</div></div>' : '')+
  alertHtml+
  '<div class="ai-updated">✦ Gemini AI + Google Search · '+(data.updatedAt||'')+'</div>'+
  '<div class="disclaimer">※ AI 분석 결과는 참고용입니다. 실제 제재 준수는 반드시 공식 출처와 법률 전문가를 통해 확인하세요.</div>';
}

function updateTimeline(tlData, updatedAt) {
  const pane = document.getElementById('tab-timeline');
  if (!pane) return;
  const tc = {un:'var(--un)',us:'var(--us)',both:'var(--both)'};
  const tb = {un:'rgba(59,158,255,.1)',us:'rgba(255,79,79,.1)',both:'rgba(196,77,255,.1)'};
  const tl = {un:'UN',us:'미국',both:'UN·미국'};
  pane.innerHTML =
    '<div class="tl-header ai-updated"><div class="live-dot"></div>AI가 최신 정보로 업데이트 · '+updatedAt+'</div>'+
    '<div class="timeline">'+
      tlData.map(function(t){
        return '<div class="tl-item">'+
          '<div class="tl-dot '+(t.type||'us')+'"></div>'+
          '<div class="tl-date">'+t.date+'</div>'+
          '<div class="tl-ttl">'+t.title+'</div>'+
          '<div class="tl-desc">'+t.desc+'</div>'+
          '<span class="tl-tag" style="color:'+(tc[t.type]||tc.us)+';background:'+(tb[t.type]||tb.us)+';border:1px solid '+(tc[t.type]||tc.us)+'44">'+(tl[t.type]||'제재')+'</span>'+
        '</div>';
      }).join('')+
    '</div>';
}

// ── D3 지도 ──
const mapSvg = d3.select('#map-svg');
let proj, pathFn, zoom, g;
const N2A={"408":"PRK","364":"IRN","729":"SDN","706":"SOM","180":"COD","140":"CAF","466":"MLI","624":"GNB","434":"LBY","887":"YEM","728":"SSD","332":"HTI","324":"GIN","232":"ERI","192":"CUB","760":"SYR","643":"RUS","112":"BLR","104":"MMR","862":"VEN","558":"NIC","716":"ZWE"};

function initMap(){
  const W = document.getElementById('map-area').clientWidth;
  const H = document.getElementById('map-area').clientHeight;
  proj = d3.geoNaturalEarth1().scale(W/6.1).translate([W/2, H/2]);
  pathFn = d3.geoPath().projection(proj);
  zoom = d3.zoom().scaleExtent([.5,10]).on('zoom', function(e){ g.attr('transform',e.transform); });
  mapSvg.attr('width',W).attr('height',H).call(zoom);
  mapSvg.append('rect').attr('width',W).attr('height',H).attr('fill','#07090e');
  g = mapSvg.append('g');
  g.append('path').datum(d3.geoGraticule()()).attr('d',pathFn).attr('fill','none').attr('stroke','#0d1825').attr('stroke-width',.4);
  fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
    .then(function(r){return r.json();})
    .then(function(world){
      const feats = topojson.feature(world, world.objects.countries);
      const tip = document.getElementById('tip');
      g.selectAll('.country-path').data(feats.features).enter().append('path')
        .attr('class', function(d){ const iso=N2A[d.id]; const sd=iso?SD[iso]:null; return 'country-path '+getCat(sd)+'-sanction'; })
        .attr('id', function(d){ const iso=N2A[d.id]; return iso?'cp-'+iso:null; })
        .attr('d', pathFn)
        .on('mousemove', function(ev,d){
          const iso=N2A[d.id]; const sd=iso?SD[iso]:null;
          if(!sd){ tip.classList.remove('show'); return; }
          const c=getCat(sd);
          const cc={both:'var(--both)',un:'var(--un)',us:'var(--us)'}[c];
          document.getElementById('tt-name').textContent=sd.flag+' '+sd.name;
          document.getElementById('tt-badges').innerHTML=(sd.un?'<span class="badge badge-un">UN</span>':'')+(sd.us?'<span class="badge badge-us">US</span>':'');
          document.getElementById('tt-desc').innerHTML='<span style="color:'+cc+'">'+(c==='both'?'UN+미국':c==='un'?'UN 단독':'미국 단독')+'</span><br>'+sd.sectors.slice(0,3).join(' · ');
          const r=document.getElementById('map-area').getBoundingClientRect();
          let x=ev.clientX-r.left+14, y=ev.clientY-r.top-10;
          if(x+220>r.width) x-=234;
          tip.style.left=x+'px'; tip.style.top=y+'px'; tip.classList.add('show');
        })
        .on('mouseleave', function(){ document.getElementById('tip').classList.remove('show'); })
        .on('click', function(ev,d){ const iso=N2A[d.id]; if(iso&&SD[iso]) openDrawer(iso); });
      updateColors();
    })
    .catch(function(){
      g.append('text').attr('x',100).attr('y',100).attr('fill','#6b7a99').attr('font-size',13).text('지도 데이터 로드 오류');
    });
}

function updateColors(){
  d3.selectAll('.country-path').each(function(d){
    const iso=d?N2A[d.id]:null; const sd=iso?SD[iso]:null;
    const vis=sd&&isVis(sd); const cat=getCat(sd);
    this.className.baseVal='country-path '+(vis?cat:'neutral')+'-sanction';
    if(iso===currentISO&&vis) this.classList.add('hl');
  });
}

function zoomIn(){ mapSvg.transition().call(zoom.scaleBy, 1.5); }
function zoomOut(){ mapSvg.transition().call(zoom.scaleBy, .67); }
function resetZoom(){ mapSvg.transition().call(zoom.transform, d3.zoomIdentity); }

document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeDrawer(); });
buildList();
window.addEventListener('load', initMap);
window.addEventListener('resize', function(){
  const W=document.getElementById('map-area').clientWidth;
  const H=document.getElementById('map-area').clientHeight;
  mapSvg.attr('width',W).attr('height',H);
  proj.scale(W/6.1).translate([W/2,H/2]);
  pathFn=d3.geoPath().projection(proj);
  d3.selectAll('.country-path').attr('d',pathFn);
});
</script>
